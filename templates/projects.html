<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты — TaskManager</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar">
    <a href="/" class="nav-logo">✅ TaskManager</a>
    <div class="nav-right">
        <span id="nav-user" class="nav-user"></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Выйти</button>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Мои проекты</h1>
        <button class="btn btn-primary" onclick="openModal('create-project-modal')">+ Новый проект</button>
    </div>

    <div id="projects-grid" class="projects-grid">
        <div class="loading">Загрузка...</div>
    </div>
</div>

<!-- Модальное окно создания проекта -->
<div id="create-project-modal" class="modal hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Новый проект</h2>
            <button class="modal-close" onclick="closeModal('create-project-modal')">✕</button>
        </div>
        <div class="form-group">
            <label>Название</label>
            <input type="text" id="project-name" placeholder="Название проекта">
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea id="project-desc" placeholder="Описание проекта" rows="3"></textarea>
        </div>
        <div id="project-error" class="error-msg hidden"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('create-project-modal')">Отмена</button>
            <button class="btn btn-primary" onclick="createProject()">Создать</button>
        </div>
    </div>
</div>
<div class="modal-overlay hidden" onclick="closeAllModals()"></div>

<script src="/static/js/app.js"></script>
<script src="/static/js/projects.js"></script>
</body>
</html>
