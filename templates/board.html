<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доска — TaskManager</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-left">
        <a href="/" class="nav-logo">✅ TaskManager</a>
        <span class="nav-sep">/</span>
        <span id="project-title" class="nav-project"></span>
    </div>
    <div class="nav-right">
        <!-- Аватары участников -->
        <div id="members-avatars" class="members-avatars" title="Участники проекта"></div>
        <button class="btn btn-outline btn-sm" onclick="openModal('members-modal')">👥 Участники</button>
        <span id="nav-user" class="nav-user"></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Выйти</button>
    </div>
</nav>

<div class="board-header">
    <button class="btn btn-primary" onclick="openCreateTask()">+ Новая задача</button>
    <div class="filters">
        <select id="filter-priority" onchange="loadTasks()">
            <option value="">Все приоритеты</option>
            <option value="high">Высокий</option>
            <option value="medium">Средний</option>
            <option value="low">Низкий</option>
        </select>
        <select id="filter-assignee" onchange="loadTasks()">
            <option value="">Все исполнители</option>
        </select>
    </div>
</div>

<div class="board">
    <div class="board-col">
        <div class="col-header col-todo">📋 К выполнению</div>
        <div class="col-body" id="col-todo" ondragover="allowDrop(event)" ondrop="dropTask(event,'todo')"></div>
    </div>
    <div class="board-col">
        <div class="col-header col-progress">⚙️ В работе</div>
        <div class="col-body" id="col-in_progress" ondragover="allowDrop(event)" ondrop="dropTask(event,'in_progress')"></div>
    </div>
    <div class="board-col">
        <div class="col-header col-review">👀 На проверке</div>
        <div class="col-body" id="col-review" ondragover="allowDrop(event)" ondrop="dropTask(event,'review')"></div>
    </div>
    <div class="board-col">
        <div class="col-header col-done">✅ Готово</div>
        <div class="col-body" id="col-done" ondragover="allowDrop(event)" ondrop="dropTask(event,'done')"></div>
    </div>
</div>

<!-- ===== Модальное: создание задачи ===== -->
<div id="create-task-modal" class="modal hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Новая задача</h2>
            <button class="modal-close" onclick="closeModal('create-task-modal')">✕</button>
        </div>
        <div class="form-group">
            <label>Название</label>
            <input type="text" id="task-title" placeholder="Название задачи">
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea id="task-desc" placeholder="Описание" rows="3"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Приоритет</label>
                <select id="task-priority">
                    <option value="low">Низкий</option>
                    <option value="medium" selected>Средний</option>
                    <option value="high">Высокий</option>
                </select>
            </div>
            <div class="form-group">
                <label>Дедлайн</label>
                <input type="datetime-local" id="task-deadline">
            </div>
        </div>
        <div class="form-group">
            <label>Исполнитель</label>
            <select id="task-assignee">
                <option value="">— Не назначен —</option>
            </select>
        </div>
        <div id="task-error" class="error-msg hidden"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('create-task-modal')">Отмена</button>
            <button class="btn btn-primary" onclick="createTask()">Создать</button>
        </div>
    </div>
</div>

<!-- ===== Модальное: просмотр задачи ===== -->
<div id="view-task-modal" class="modal hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="view-task-title"></h2>
            <button class="modal-close" onclick="closeModal('view-task-modal')">✕</button>
        </div>
        <p id="view-task-desc" class="task-desc"></p>
        <div class="task-meta">
            <span id="view-task-priority" class="badge"></span>
            <span id="view-task-deadline" class="task-deadline"></span>
        </div>
        <div id="view-task-assignee" class="task-assignee-row hidden"></div>
        <div class="modal-footer">
            <button class="btn btn-danger btn-sm" onclick="deleteCurrentTask()">Удалить</button>
        </div>
    </div>
</div>

<!-- ===== Модальное: участники ===== -->
<div id="members-modal" class="modal hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h2>👥 Участники проекта</h2>
            <button class="modal-close" onclick="closeModal('members-modal')">✕</button>
        </div>

        <!-- Список участников -->
        <div id="members-list" class="members-list"></div>

        <!-- Пригласить (только для владельца) -->
        <div id="invite-section" class="invite-section hidden">
            <div class="invite-divider">Добавить участника</div>
            <div class="invite-row">
                <input type="text" id="invite-username" placeholder="Имя пользователя" autocomplete="off">
                <button class="btn btn-primary btn-sm" onclick="inviteMember()">Добавить</button>
            </div>
            <div id="invite-error" class="error-msg hidden"></div>
            <div id="invite-success" class="success-msg hidden"></div>
        </div>

        <!-- Покинуть проект (только для участников) -->
        <div id="leave-section" class="hidden">
            <div class="invite-divider"></div>
        </div>

        <div class="modal-footer">
            <button id="copy-invite-btn" class="btn btn-outline btn-sm hidden" onclick="copyInviteLink()">🔗 Скопировать инвайт</button>
            <button id="leave-btn" class="btn btn-danger btn-sm hidden" onclick="leaveProject()">🚪 Покинуть проект</button>
            <button class="btn btn-outline" onclick="closeModal('members-modal')">Закрыть</button>
        </div>
    </div>
</div>

<div class="modal-overlay hidden" onclick="closeAllModals()"></div>

<script src="/static/js/app.js"></script>
<script src="/static/js/board.js"></script>
</body>
</html>
